<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarot Draw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./output.css" />
    <script defer src="./deck.js"></script>
    <script defer src="./app.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="bg-page font-sans text-text antialiased">
    <div x-data="tarotApp" class="min-h-screen">
      <main class="mx-auto w-full px-4 py-6 sm:px-6 lg:px-8">
        <section class="mb-6">
          <div class="mx-auto w-full max-w-md rounded-md border border-border bg-surface p-5 shadow-card">
            <div class="space-y-3">
              <h1 class="text-xl font-semibold text-text" x-text="t('siteTitle')"></h1>
              <div class="flex flex-col gap-3 sm:flex-row">
                <select
                  x-model.number="spreadSize"
                  class="w-full rounded-md border border-border bg-page px-3 py-2 text-sm text-text outline-none transition focus:border-accent sm:w-32"
                >
                  <option value="1" x-text="spreadOptionLabel(1)"></option>
                  <option value="3" x-text="spreadOptionLabel(3)"></option>
                  <option value="5" x-text="spreadOptionLabel(5)"></option>
                </select>
                <button
                  @click="drawCards()"
                  type="button"
                  class="w-full rounded-md bg-accent px-3 py-2 text-sm font-medium text-page transition hover:opacity-90"
                  x-text="t('drawCards')"
                >
                </button>
                <div class="flex w-full rounded-md border border-border bg-page p-1 sm:w-40">
                  <button
                    @click="setLanguage('lv')"
                    type="button"
                    :aria-pressed="language === 'lv'"
                    :aria-label="t('languageLatvian')"
                    :class="language === 'lv' ? 'bg-surface' : 'hover:bg-surface/60'"
                    class="flex-1 rounded-sm px-3 py-2 text-lg transition"
                  >
                    🇱🇻
                  </button>
                  <button
                    @click="setLanguage('en')"
                    type="button"
                    :aria-pressed="language === 'en'"
                    :aria-label="t('languageEnglish')"
                    :class="language === 'en' ? 'bg-surface' : 'hover:bg-surface/60'"
                    class="flex-1 rounded-sm px-3 py-2 text-lg transition"
                  >
                    🇬🇧
                  </button>
                  <button
                    @click="setLanguage('ru')"
                    type="button"
                    :aria-pressed="language === 'ru'"
                    :aria-label="t('languageRussian')"
                    :class="language === 'ru' ? 'bg-surface' : 'hover:bg-surface/60'"
                    class="flex-1 rounded-sm px-3 py-2 text-lg transition"
                  >
                    🇷🇺
                  </button>
                </div>
              </div>

            </div>
          </div>
        </section>

        <section class="space-y-4">
          <template x-if="drawnCards.length > 0">
            <div class="rounded-md border border-border bg-surface shadow-card lg:mx-auto lg:w-fit">
                <div>
                  <div
                    x-ref="cardsCarousel"
                    class="gap-4 pb-2 lg:flex lg:flex-wrap lg:justify-center lg:overflow-visible lg:snap-none lg:pb-0"
                    :class="drawnCards.length > 1 ? 'flex overflow-hidden snap-x snap-mandatory' : 'space-y-4'"
                  >
                  <template x-for="card in drawnCards" :key="card.slot + card.name">
                    <article
                      data-card-slide
                      class="w-full rounded-md border border-border bg-panel p-4 lg:w-[300px] lg:min-w-[300px]"
                      :class="drawnCards.length > 1 ? 'min-w-full snap-center' : 'mx-auto'"
                    >
                      <div class="space-y-4">
                        <div class="border-b border-border pb-3">
                          <div class="flex min-h-10 items-center">
                            <h3
                              class="max-h-10 overflow-hidden text-base font-semibold leading-5"
                              x-text="localizedCardName(card)"
                            ></h3>
                          </div>
                          <div class="mt-2 flex min-h-8 items-center justify-between gap-4">
                            <span
                              class="inline-flex h-9 shrink-0 items-center rounded-md border border-border px-3 text-sm font-medium text-text"
                              x-text="card.slotLabel"
                            ></span>
                          </div>
                        </div>

                        <div class="rounded-md border border-border bg-page p-3">
                          <div
                            class="mx-auto flex max-w-[150px] items-center justify-center overflow-hidden rounded-sm border border-border bg-paper"
                            style="aspect-ratio: 1112 / 1920"
                          >
                            <div class="relative h-full w-full">
                              <div
                                x-show="!card.imageLoaded && !card.imageError"
                                class="absolute inset-0 flex items-center justify-center bg-paper px-4 text-center text-sm text-ink"
                              >
                                <span x-text="t('loadingImage')"></span>
                              </div>
                              <img
                                x-show="!card.imageError"
                                :src="card.imageUrl"
                                :alt="localizedCardName(card)"
                                :class="card.reversed ? 'rotate-180' : ''"
                                loading="lazy"
                                class="h-full w-full object-contain transition duration-150"
                                @load="card.imageLoaded = true"
                                @error="card.imageError = true; card.imageLoaded = false"
                              />
                              <div
                                x-show="card.imageError"
                                class="absolute inset-0 flex items-center justify-center bg-paper px-4 text-center text-sm text-ink"
                              >
                                <span x-text="t('imageUnavailable')"></span>
                              </div>
                            </div>
                          </div>

                          <div
                            x-show="drawnCards.length > 1"
                            class="mt-3 flex items-center justify-between gap-3 lg:hidden"
                          >
                            <button
                              @click="scrollCards(-1)"
                              type="button"
                              class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-white/85 text-base text-page transition hover:bg-white"
                              :aria-label="t('previousCard')"
                            >
                              &larr;
                            </button>
                            <button
                              @click="scrollCards(1)"
                              type="button"
                              class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-white/85 text-base text-page transition hover:bg-white"
                              :aria-label="t('nextCard')"
                            >
                              &rarr;
                            </button>
                          </div>

                          <div class="mt-3 space-y-4 text-left">
                            <div class="border-b border-border pb-3">
                              <p class="text-sm text-muted">
                                <span x-text="localizedArcana(card)"></span>
                                <span x-show="card.suit"> • <span x-text="localizedSuit(card)"></span></span>
                                <span> • </span>
                                <span x-text="localizedOrientation(card)"></span>
                              </p>
                            </div>

                            <div class="space-y-2">
                              <p class="text-sm leading-6 text-text" x-text="card.meaning"></p>
                              <p class="text-sm leading-6 text-muted" x-text="card.application"></p>
                            </div>

                            <div class="space-y-2">
                              <p class="text-xs uppercase tracking-[0.14em] text-muted" x-text="t('keywords')"></p>
                              <div class="flex flex-wrap gap-2">
                                <template x-for="keyword in card.keywords" :key="keyword">
                                  <span
                                    class="rounded-md border border-border px-2 py-1 text-xs text-muted"
                                    x-text="keyword"
                                  ></span>
                                </template>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </article>
                  </template>
                  </div>
                </div>
            </div>
          </template>
        </section>
      </main>
    </div>
  </body>
</html>
